<!DOCTYPE html> 
<html>
  <head>
    <title>Number Guessing Game</title>
    <script src="script.js" defer></script>

    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: linear-gradient(135deg, #1e1e2f, #3a3a5a);
        color: white;
        margin: 0;
        padding: 20px;
      }

      h3 {
        margin-top: 20px;
      }

      input, button {
        margin: 10px;
        padding: 12px;
        font-size: 16px;
        border-radius: 12px;
        border: none;
      }

      input {
        width: 120px;
        text-align: center;
      }

      button {
        background: #4CAF50;
        color: white;
        box-shadow: 0 4px #2e7d32;
        cursor: pointer;
      }

      button:active {
        transform: translateY(2px);
        box-shadow: 0 2px #2e7d32;
      }

      button:disabled {
        background: gray;
        box-shadow: none;
        cursor: not-allowed;
      }

      #msg {
        font-size: 20px;
        font-weight: bold;
      }

      #timerDisplay {
        font-size: 18px;
        margin-top: 10px;
      }

      ol {
        padding: 0;
        list-style-position: inside;
      }

      .confetti {
        position: fixed;
        width: 8px;
        height: 8px;
        top: -10px;
        animation: fall linear forwards;
      }

      @keyframes fall {
        to {
          transform: translateY(100vh) rotate(720deg);
        }
      }

      .shake {
        animation: shake 0.3s;
      }

      @keyframes shake {
        0% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        50% { transform: translateX(5px); }
        75% { transform: translateX(-5px); }
        100% { transform: translateX(0); }
      }

      .win-glow {
        animation: glow 1s;
      }

      @keyframes glow {
        0% { background: #1e1e2f; }
        50% { background: #2ecc71; }
        100% { background: #1e1e2f; }
      }
    </style>
  </head>

  <body>
    <p id="date"></p>

    <label>Name:</label>
    <input type="text" id="playerName" value="Player"> 

    <h3>Level</h3>
    <input type="radio" name="level" id="e" value="3" checked><label for="e">Easy</label>
    <input type="radio" name="level" id="m" value="10"><label for="m">Medium</label>
    <input type="radio" name="level" id="h" value="100"><label for="h">Hard</label>

    <br>
    <button id="playBtn">Play</button>

    <h3 id="msg">Select a Level</h3>

    <input type="number" id="guess" placeholder="Enter guess">
    <br>
    <button id="guessBtn" disabled>Guess</button>
    <button id="giveUpBtn" disabled>Give Up</button>

    <h3>Stats</h3>
    <p id="wins">Total wins: 0</p>
    <p id="avgScore">Average Score: </p>
    <p id="fastest">Fastest Game: </p>
    <p id="avgTime">Average Time: </p>
    <p id="bestScore">Best Score: ---</p>
    <p id="timerDisplay">Current Round: 0s</p>

    <h3>Leaderboard</h3>
    <ol>
      <li name="leaderboard">---</li>
      <li name="leaderboard">---</li>
      <li name="leaderboard">---</li>
    </ol>
  </body>
</html>
